<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSGF | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-sidebar: #1e1e1e;
            --bg-main: #121212;
            --lime: #3fb950; /* Xanh lá Bedrock */
            --border: #30363d;
            --text-dim: #8b949e;
        }

        body {
            margin: 0; display: flex; background: var(--bg-main); color: white;
            font-family: 'JetBrains Mono', monospace;
        }

        /* MENU DỌC BÊN TRÁI (SIDEBAR) */
        .sidebar {
            width: 280px; height: 100vh; background: var(--bg-sidebar);
            position: fixed; left: 0; top: 0; padding: 30px 20px;
            box-sizing: border-box; border-right: 1px solid var(--border);
        }

        .sys-status { color: var(--lime); font-size: 0.8rem; margin-bottom: 30px; font-weight: bold; }

        .category-label {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.75rem; color: var(--text-dim); margin: 25px 0 10px;
            text-transform: uppercase; letter-spacing: 2px;
        }

        .sidebar a {
            display: block; color: var(--lime); text-decoration: none;
            padding: 10px 0; font-size: 0.9rem; transition: 0.2s;
        }

        .sidebar a:hover { color: white; text-decoration: underline; }

        /* NỘI DUNG CHÍNH BÊN PHẢI */
        .main-content { margin-left: 280px; padding: 60px; width: 100%; }
        
        .page-header { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 40px; }
        .page-header h1 { font-size: 2rem; margin: 0; color: white; }

        .game-item {
            background: #1c1c1c; border: 1px solid var(--border);
            border-radius: 6px; padding: 25px; margin-bottom: 20px;
            border-left: 4px solid var(--lime);
        }

        .btn-action {
            display: inline-block; margin-top: 15px; padding: 8px 20px;
            border: 1px solid var(--lime); color: var(--lime);
            text-decoration: none; font-weight: bold; border-radius: 4px;
            transition: 0.3s; font-size: 0.85rem;
        }

        .btn-action:hover { background: var(--lime); color: #000; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sys-status">CSGF_PORTAL [ONLINE]</div>
        
        <div class="category-label">RELEASES</div>
        <a href="index.html">Current Releases</a>
        <a href="#">Old Versions</a>

        <div class="category-label">DEV INFO</div>
        <a href="hardware.html">Hardware Prerequisites</a>
        <a href="#">Website Source</a>

        <div class="category-label">CONTACT</div>
        <a href="https://www.facebook.com/vu.manh.hiep.761667/about" target="_blank">Support Page</a>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h1>Releases / Home</h1>
        </div>

        <div class="game-item">
            <h3 style="margin:0">Pacify</h3>
            <p style="color:var(--text-dim)">Tệp tin trò chơi Pacify chính thức dành cho Windows.</p>
            <a href="https://drive.google.com/file/d/12UPH_FbpdHPxYyLQfejwJZm23ZZdpMUz/view?usp=sharing" target="_blank" class="btn-action">GET DATA</a>
        </div>

        <div class="game-item">
            <h3 style="margin:0">Age of History 3</h3>
            <p style="color:var(--text-dim)">Bản lưu trữ dữ liệu trò chơi AoH 3 đầy đủ.</p>
            <a href="https://www.mediafire.com/file/lul4f1klyeftjqi/Age_of_History_3.rar/file" target="_blank" class="btn-action">GET DATA</a>
        </div>
    </div>

</body>
</html>
