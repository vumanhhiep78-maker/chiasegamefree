<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hardware Prerequisites</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #121212; color: #3fb950; 
            font-family: 'JetBrains Mono', monospace; padding: 60px 10%; 
        }
        .box { border: 1px solid #30363d; padding: 40px; border-radius: 8px; background: #1c1c1c; }
        h1 { color: white; border-bottom: 2px solid #3fb950; padding-bottom: 10px; }
        .spec { margin: 15px 0; font-size: 1.1rem; }
        .back-link { display: inline-block; margin-top: 30px; color: white; text-decoration: none; border-bottom: 1px solid white; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Yêu cầu phần cứng</h1>
        <div class="spec">> CPU: Intel Core i5-1235U hoặc tương đương</div>
        <div class="spec">> RAM: 16GB (Khuyên dùng Dual Channel)</div>
        <div class="spec">> GPU: Intel Iris Xe Graphics</div>
        <div class="spec">> OS: Windows 11 64-bit</div>
        <div class="spec">> Storage: Tối thiểu 500MB trống</div>
        <a href="index.html" class="back-link">Quay lại trang chủ</a>
    </div>
</body>
</html>
